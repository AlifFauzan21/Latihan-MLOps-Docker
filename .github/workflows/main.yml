name: CI/CD MLflow Docker

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_URI: file:./mlruns

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install mlflow pandas scikit-learn

      - name: Run Training (MLflow Project)
        run: |
          set -e
          mlflow run . -e main --env-manager=local

      - name: Debug mlruns
        run: |
          echo "=== DEBUG mlruns ==="
          ls -R mlruns || echo "mlruns tidak ditemukan"

      - name: Get Latest Run ID (SAFE)
        id: get_run
        run: |
          set -e
          if [ ! -d "mlruns" ]; then
            echo "mlruns tidak ada!"
            exit 1
          fi

          RUN_ID=$(find mlruns -type d -path "*/artifacts" | head -n 1 | cut -d'/' -f3)

          if [ -z "$RUN_ID" ]; then
            echo "RUN_ID tidak ditemukan!"
            exit 1
          fi

          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Run ID: $RUN_ID"

      - name: Verify Model Exists
        run: |
          set -e
          if [ ! -d "mlruns/0/$RUN_ID/artifacts/model" ]; then
            echo "Model tidak ditemukan!"
            exit 1
          fi

      - name: Build Docker Image
        run: |
          set -e
          mlflow models build-docker -m "runs:/$RUN_ID/model" -n "cc"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag Docker Image
        run: |
          docker tag cc ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest
          docker tag cc ${{ secrets.DOCKER_HUB_USERNAME }}/cc:${{ github.sha }}

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/cc:${{ github.sha }}