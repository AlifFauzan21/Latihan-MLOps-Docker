name: CI/CD MLflow Docker

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_URI: sqlite:///mlflow.db

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install mlflow pandas scikit-learn

      - name: Run Training (MLflow Project)
        run: |
          set -e
          mlflow run . -e main --env-manager=local

      - name: Get Run ID
        run: |
          set -e
          RUN_ID=$(cat run_id.txt)
          if [ -z "$RUN_ID" ]; then
            echo "RUN_ID tidak ditemukan!"
            exit 1
          fi
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Run ID: $RUN_ID"

      - name: Verify Model Exists
        run: |
          set -e
          python - <<'EOF'
          import mlflow, os
          mlflow.set_tracking_uri(os.environ["MLFLOW_TRACKING_URI"])
          run_id = open("run_id.txt").read().strip()
          client = mlflow.tracking.MlflowClient()
          arts = client.list_artifacts(run_id, "model_artifacts/online_model")
          print(f"Artifacts ditemukan: {[a.path for a in arts]}")
          assert len(arts) > 0, "Model tidak ditemukan!"
          print("Verifikasi berhasil!")
          EOF

      - name: Build Docker Image
        run: |
          set -e
          mlflow models build-docker -m "runs:/$RUN_ID/model_artifacts/online_model" -n "cc"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag Docker Image
        run: |
          docker tag cc ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest
          docker tag cc ${{ secrets.DOCKER_HUB_USERNAME }}/cc:${{ github.sha }}

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/cc:${{ github.sha }}