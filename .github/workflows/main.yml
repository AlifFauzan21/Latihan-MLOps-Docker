name: CI/CD MLflow Docker

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_URI: sqlite:///mlflow.db  # ✅ Fix: pakai sqlite, bukan file://

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install mlflow pandas scikit-learn

      - name: Run Training (MLflow Project)
        run: |
          set -e
          mlflow run . -e main --env-manager=local

      - name: Debug mlruns
        run: |
          echo "=== DEBUG mlruns ==="
          ls -R mlruns || echo "mlruns tidak ditemukan"
          echo "=== DEBUG mlflow.db ==="
          ls -la mlflow.db || echo "mlflow.db tidak ditemukan"

      - name: Get Latest Run ID
        id: get_run
        run: |
          set -e
          # ✅ Fix: query langsung dari sqlite via python, lebih reliable
          RUN_ID=$(python - <<'EOF'
          import mlflow
          import os
          mlflow.set_tracking_uri(os.environ["MLFLOW_TRACKING_URI"])
          client = mlflow.tracking.MlflowClient()
          experiments = client.search_experiments()
          for exp in experiments:
              runs = client.search_runs(
                  experiment_ids=[exp.experiment_id],
                  order_by=["start_time DESC"],
                  max_results=1
              )
              if runs:
                  print(runs[0].info.run_id)
                  break
          EOF
          )

          if [ -z "$RUN_ID" ]; then
            echo "RUN_ID tidak ditemukan!"
            exit 1
          fi

          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Run ID ditemukan: $RUN_ID"

      - name: Verify Model Exists
        run: |
          set -e
          # ✅ Fix: verifikasi via python, bukan hardcode path
          python - <<EOF
          import mlflow
          import os
          mlflow.set_tracking_uri(os.environ["MLFLOW_TRACKING_URI"])
          client = mlflow.tracking.MlflowClient()
          run_id = os.environ["RUN_ID"]
          artifacts = client.list_artifacts(run_id)
          names = [a.path for a in artifacts]
          print(f"Artifacts ditemukan: {names}")
          assert len(artifacts) > 0, "Tidak ada artifact!"
          EOF

      - name: Build Docker Image
        run: |
          set -e
          mlflow models build-docker -m "runs:/$RUN_ID/model_artifacts/online_model" -n "cc"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag Docker Image
        run: |
          docker tag cc ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest
          docker tag cc ${{ secrets.DOCKER_HUB_USERNAME }}/cc:${{ github.sha }}

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/cc:${{ github.sha }}