name: CI/CD MLflow Docker

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow pandas scikit-learn

      - name: Run Training
        # Menggunakan titik (.) agar MLflow menjalankan folder saat ini sebagai proyek lokal
        run: |
          mlflow run . --env-manager=local

      - name: Get Run ID
        run: |
          # Mengambil Run ID terbaru dari folder mlruns
          RUN_ID=$(ls -td mlruns/0/*/ | head -n 1 | cut -d'/' -f3)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest Run ID found: $RUN_ID"

      - name: Build Docker Image
        run: |
          # Membangun image Docker berdasarkan Run ID yang didapat
          mlflow models build-docker -m "runs:/$RUN_ID/model" -n "cc"

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Push to Docker Hub
        run: |
          # Tagging dan Push ke Docker Hub menggunakan username dari Secrets
          docker tag cc ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest